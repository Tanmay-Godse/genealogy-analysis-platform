services:
  neo4j:
    image: neo4j:5.26.23-community-ubi10
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/familytree-dev-password
    volumes:
      - neo4j-data:/data

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: family_tree
      POSTGRES_USER: family_tree
      POSTGRES_PASSWORD: familytree-dev-password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  opensearch:
    image: opensearchproject/opensearch:3.0.0
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "FamilyTreeDev@2026"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: familytree
      MINIO_ROOT_PASSWORD: familytree-dev-password
    volumes:
      - minio-data:/data

volumes:
  neo4j-data:
  postgres-data:
  opensearch-data:
  minio-data:
